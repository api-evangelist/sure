aid: sure
name: Sure
description: >-
  Sure is an embedded insurance platform providing purpose-built REST APIs for
  distributing insurance products through digital channels. The platform enables
  brands, carriers, MGAs, and marketplaces to build, launch, and scale digital
  insurance programs covering quoting, binding, policy management, claims
  processing, payments, and compliance workflows across all 50 US states.
