apis:
  - name: Sure Platform API
    description: >-
      REST APIs for the full embedded insurance lifecycle including quoting,
      rating, binding, policy management, claims intake through settlement,
      premium payments (card, ACH, bank rail, escrow), and compliance
      monitoring. Delivers 240ms median quote-to-bind latency and 99.9% uptime
      SLA across 40+ active programs in 50 states and DC.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
