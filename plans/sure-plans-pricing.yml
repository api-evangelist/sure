name: Sure Plans and Pricing
description: >-
  Sure offers enterprise-grade embedded insurance infrastructure with custom
  pricing tailored to program size, product lines, and integration scope.
  Pricing is not publicly listed and is negotiated directly based on business
  requirements, volume, and the specific AI modules deployed.
